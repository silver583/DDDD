<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나염의뢰서 생성기</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root { --val-top: 17.975%; --val-h: 6.719%; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { font-family: 'Noto Sans KR', sans-serif; background: #eef0f4; color: #111; }

  .topbar { background:#fff; border-bottom:1px solid #e2e4ea; padding:16px 22px; display:flex; align-items:center; gap:14px; }
  .topbar h1 { font-size:18px; font-weight:700; letter-spacing:-0.4px; }
  .badge { display:inline-flex; align-items:center; gap:6px; font-size:13px; font-weight:500; padding:5px 11px; border-radius:999px; }
  .badge.on  { background:#e7f7ee; color:#12864a; }
  .badge.off { background:#fdecec; color:#c0392b; }
  .badge.wait{ background:#fef6e7; color:#a9791a; }
  .badge .dot { width:8px; height:8px; border-radius:50%; background:currentColor; }

  .search-wrap { max-width:640px; margin:34px auto 10px; padding:0 18px; position:relative; }
  .search-wrap label { display:block; font-size:14px; color:#59606c; margin-bottom:8px; }
  .search-box { display:flex; align-items:center; gap:10px; background:#fff; border:1.5px solid #d4d7de; border-radius:14px; padding:4px 6px 4px 16px; box-shadow:0 2px 10px rgba(20,25,40,.05); }
  .search-box:focus-within { border-color:#2563eb; box-shadow:0 2px 14px rgba(37,99,235,.14); }
  .search-box svg { flex:0 0 auto; color:#98a0ad; }
  .search-box input { flex:1; border:0; outline:0; font-family:inherit; font-size:17px; padding:12px 4px; background:transparent; }
  .search-box .go { border:0; background:#111; color:#fff; font-family:inherit; font-size:14px; padding:10px 16px; border-radius:10px; cursor:pointer; }
  .search-box input:disabled, .search-box .go:disabled { opacity:.5; }

  .suggest { position:absolute; left:18px; right:18px; top:100%; margin-top:6px; z-index:50; background:#fff; border:1px solid #e2e4ea; border-radius:12px; overflow:hidden; box-shadow:0 10px 30px rgba(20,25,40,.14); display:none; max-height:340px; overflow-y:auto; }
  .suggest.show { display:block; }
  .suggest .item { padding:12px 16px; cursor:pointer; display:flex; justify-content:space-between; gap:12px; }
  .suggest .item:hover, .suggest .item.active { background:#f2f6ff; }
  .suggest .item .nm { font-size:15px; }
  .suggest .item .nm b { color:#2563eb; font-weight:700; }
  .suggest .item .sn { font-size:12px; color:#98a0ad; white-space:nowrap; }
  .suggest .empty { padding:14px 16px; color:#98a0ad; font-size:14px; }

  .hint { max-width:640px; margin:8px auto 0; padding:0 18px; font-size:12px; color:#9aa1ad; }
  .tools { max-width:640px; margin:18px auto 0; padding:0 18px; display:flex; gap:8px; }
  .tools button { font-family:inherit; font-size:14px; padding:9px 16px; border:0; border-radius:9px; cursor:pointer; background:#eef0f4; color:#111; }
  .tools button.primary { background:#111; color:#fff; }

AAgRD7AAAAACAQYh8AAAAABELsAwAAAIBAiH0AAAAAEAixDwAAAAACIfYBAAAAQCDEPgAAAAAIhNgHAAAAAIEQ+wAAAAAgEGIfAAAAAARC7AMAAACAQIh9AAAAABAIsQ8AAAAAAiH2AQAAAEAgxD4AAAAACITYBwAAAACBEPsAAAAAIBBiHwAAAAAEQuwDAAAAgECIfQAAAAAQCLEPAAAAAAIh9gEAAABAIMQ+AAAAAAiE2AcAAAAAgRD7AAAAACAQYh8AAAAABELsAwAAAIBAiH0AAAAAEAixDwAAAAACIfYBAAAAQCDEPgAAAAAIhNgHAAAAAIEQ+wAAAAAgEGIfAAAAAARC7AMAAACAQIh9AAAAABAIsQ8AAAAAAiH2AQAAAEAgxD4AAAAACITYBwAAAACBEPsAAAAAIBBiHwAAAAAEQuwDAAAAgECIfQAAAAAQCLEPAAAAAAIh9gEAAABAIMQ+AAAAAAiE2AcAAAAAgRD7AAAAACAQYh8AAAAABELsAwAAAIBAiH0AAAAAEAixDwAAAAACIfYBAAAAQCDEPgAAAAAIhNgHAAAAAIEQ+wAAAAAgEGIfAAAAAARC7AMAAACAQIh9AAAAABAIsQ8AAAAAAiH2AQAAAEAgxD4AAAAACITYBwAAAACB+P8Zifp+SAlGcQAAAABJRU5ErkJggg=='); background-size:100% 100%; background-repeat:no-repeat; transform-origin:top center; box-shadow:0 6px 24px rgba(0,0,0,.15); }
  .field { position:absolute; height:var(--val-h); top:var(--val-top); display:flex; align-items:center; justify-content:center; }
  .field input { width:100%; height:100%; border:0; background:transparent; outline:none; text-align:center; font-family:'Noto Sans KR', sans-serif; font-weight:400; font-size:12pt; color:#000; line-height:1; padding:0 2mm; }
  .field input:placeholder-shown { background:rgba(37,99,235,.06); }
  #f_style { left:7.721%;  width:16.273%; }
  #f_name  { left:23.994%; width:16.273%; }
  #f_gong  { left:40.267%; width:16.154%; }
  #f_nayum { left:56.421%; width:16.273%; }
  #f_etc   { left:76.020%; width:16.273%; }

  @media print {
    @page { size:A4 landscape; margin:0; }
    html, body { background:#fff; }
    .topbar, .search-wrap, .hint, .tools { display:none !important; }
    .stage { padding:0; }
    .sheet { transform:none !important; box-shadow:none; }
    .field input:placeholder-shown { background:transparent; }
    .field input::placeholder { color:transparent; }
  }

<body>

  <div class="topbar">
    <h1>나염의뢰서 생성기</h1>
    <span id="badge" class="badge wait"><span class="dot"></span><span id="badgeText">노션 연동 확인 중…</span></span>
  </div>

  <div class="search-wrap">
    <label for="q">상품명으로 검색하세요</label>
    <div class="search-box">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="q" type="text" placeholder="일부만 입력해도 됩니다" autocomplete="off" disabled>
      <button class="go" id="go" disabled>검색</button>
    </div>
    <div class="suggest" id="suggest"></div>
  </div>
  <div class="hint" id="hint">제품DB(의류보드 · 상품태그=그래픽)에서 불러옵니다.</div>

  <div class="tools">
    <button class="primary" id="print">인쇄</button>
    <button id="clear">양식 비우기</button>
  </div>

  <div class="stage">
    <div class="sheet" id="sheet">
      <div class="field" id="f_style"><input type="text" placeholder="STYLE NO."></div>
      <div class="field" id="f_name"><input type="text" placeholder="상품명"></div>
      <div class="field" id="f_gong"><input type="text" placeholder="공장 거래처"></div>
      <div class="field" id="f_nayum"><input type="text" placeholder="나염 거래처"></div>
      <div class="field" id="f_etc"><input type="text" placeholder=""></div>
    </div>
  </div>

<script>
  let PRODUCTS = [];
  const q = document.getElementById('q');
  const goBtn = document.getElementById('go');
  const suggest = document.getElementById('suggest');
  const hint = document.getElementById('hint');
  const fields = {
    style: document.querySelector('#f_style input'),
    name:  document.querySelector('#f_name input'),
    gong:  document.querySelector('#f_gong input'),
    nayum: document.querySelector('#f_nayum input')
  };
  let activeIdx = -1, current = [];

  function setBadge(state, text){
    const b = document.getElementById('badge'), t = document.getElementById('badgeText');
    b.className = 'badge ' + state;
    t.innerHTML = (state==='on' ? '✓ ' : '') + text;
  }

  // 접속하자마자 노션 제품DB 불러오기
  async function loadProducts(){
    try {
      const r = await fetch('/api/products');
      const j = await r.json();
      if (!r.ok || !j.connected) throw new Error(j.error || ('HTTP '+r.status));
      PRODUCTS = j.products || [];
      setBadge('on', '연동됨');
      q.disabled = false; goBtn.disabled = false;
      hint.innerHTML = `제품DB(의류보드 · 상품태그=그래픽) <b>${j.count}개</b> 불러옴` +
        (j.categoryFiltered ? '' : ' <span style="color:#c0392b">(※ 의류 구분 속성을 못 찾아 카테고리 필터는 미적용)</span>');
      q.focus();
    } catch (e) {
      setBadge('off', '연동 안 됨');
      hint.innerHTML = '노션 연동 실패: ' + String(e.message||e) +
        '<br>(Vercel에 배포하고 NOTION_TOKEN 환경변수를 넣었는지 확인하세요. 로컬 파일로 열면 연동은 안 되고 양식만 보입니다.)';
    }
  }

  const norm = s => (s||'').toLowerCase().replace(/\s+/g,'');
  function search(term){ const t=norm(term); return t ? PRODUCTS.filter(p=>norm(p.name).includes(t)) : []; }
  function highlight(name, term){
    const t=term.trim(); if(!t) return name;
    const i=name.toLowerCase().indexOf(t.toLowerCase());
    if(i<0) return name;
    return name.slice(0,i)+'<b>'+name.slice(i,i+t.length)+'</b>'+name.slice(i+t.length);
  }
  function renderSuggest(){
    current = search(q.value); activeIdx = -1;
    if (!q.value.trim()){ suggest.classList.remove('show'); return; }
    suggest.innerHTML = current.length
      ? current.slice(0,50).map((p,i)=>`<div class="item" data-i="${i}"><span class="nm">${highlight(p.name,q.value)}</span><span class="sn">${p.style_no||''}</span></div>`).join('')
      : '<div class="empty">일치하는 제품이 없어요</div>';
    suggest.classList.add('show');
    suggest.querySelectorAll('.item').forEach(el=> el.onclick=()=>choose(current[+el.dataset.i]));
  }
  function choose(p){
    if(!p) return;
    fields.name.value  = p.name;
    fields.style.value = p.style_no || '';
    fields.gong.value  = p.factory || '';
    fields.nayum.value = p.factory || '';
    q.value = p.name; suggest.classList.remove('show');
  }
  q.addEventListener('input', renderSuggest);
  q.addEventListener('focus', renderSuggest);
  q.addEventListener('keydown', e=>{
    const items = suggest.querySelectorAll('.item');
    if(e.key==='ArrowDown'){ e.preventDefault(); activeIdx=Math.min(activeIdx+1,items.length-1); }
    else if(e.key==='ArrowUp'){ e.preventDefault(); activeIdx=Math.max(activeIdx-1,0); }
    else if(e.key==='Enter'){ if(activeIdx>=0&&current[activeIdx]) choose(current[activeIdx]); else if(current.length===1) choose(current[0]); return; }
    else return;
    items.forEach((el,i)=> el.classList.toggle('active', i===activeIdx));
  });
  goBtn.onclick = ()=>{ if(current.length) choose(current[0]); };
  document.addEventListener('click', e=>{ if(!e.target.closest('.search-wrap')) suggest.classList.remove('show'); });
  document.getElementById('print').onclick = ()=> window.print();
  document.getElementById('clear').onclick = ()=>{
    Object.values(fields).forEach(i=> i.value='');
    document.querySelector('#f_etc input').value='';
    q.value=''; suggest.classList.remove('show');
  };

  const sheet = document.getElementById('sheet');
  function fit(){
    const mmToPx=96/25.4, sheetW=297*mmToPx;
    const scale=Math.min(window.innerWidth-30, sheetW)/sheetW;
    sheet.style.transform='scale('+scale+')';
    document.querySelector('.stage').style.height=(210*mmToPx*scale+40)+'px';
  }
  window.addEventListener('resize', fit); fit();

  loadProducts();
</script>
</body>
</html>
