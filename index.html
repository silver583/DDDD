<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나염의뢰서 생성기</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root { --val-top: 17.975%; --val-h: 6.719%; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { font-family: 'Noto Sans KR', sans-serif; background: #eef0f4; color: #111; }
  .topbar { background:#fff; border-bottom:1px solid #e2e4ea; padding:14px 22px; display:flex; align-items:center; gap:12px; flex-wrap:wrap; position:sticky; top:0; z-index:100; }
  .topbar h1 { font-size:18px; font-weight:700; letter-spacing:-0.4px; }
  .badge { display:inline-flex; align-items:center; gap:6px; font-size:13px; font-weight:500; padding:5px 11px; border-radius:999px; }
  .badge.on{ background:#e7f7ee; color:#12864a; } .badge.off{ background:#fdecec; color:#c0392b; } .badge.wait{ background:#fef6e7; color:#a9791a; }
  .badge .dot { width:8px; height:8px; border-radius:50%; background:currentColor; }
  .topbar .spacer { margin-left:auto; }
  .topbar .actions { display:flex; align-items:center; gap:8px; }
  .topbar .status { font-size:12px; color:#9aa1ad; max-width:280px; }
  .btn { font-family:inherit; font-size:14px; padding:9px 16px; border:0; border-radius:9px; cursor:pointer; background:#eef0f4; color:#111; }
  .btn.primary { background:#111; color:#fff; }
  .search-wrap { max-width:640px; margin:30px auto 10px; padding:0 18px; position:relative; }
  .search-wrap label { display:block; font-size:14px; color:#59606c; margin-bottom:8px; }
  .search-box { display:flex; align-items:center; gap:10px; background:#fff; border:1.5px solid #d4d7de; border-radius:14px; padding:4px 6px 4px 16px; box-shadow:0 2px 10px rgba(20,25,40,.05); }
  .search-box:focus-within { border-color:#2563eb; box-shadow:0 2px 14px rgba(37,99,235,.14); }
  .search-box svg { flex:0 0 auto; color:#98a0ad; }
  .search-box input { flex:1; border:0; outline:0; font-family:inherit; font-size:17px; padding:12px 4px; background:transparent; }
  .search-box .go { border:0; background:#111; color:#fff; font-family:inherit; font-size:14px; padding:10px 16px; border-radius:10px; cursor:pointer; }
  .search-box input:disabled, .search-box .go:disabled { opacity:.5; }
  .suggest { position:absolute; left:18px; right:18px; top:100%; margin-top:6px; z-index:50; background:#fff; border:1px solid #e2e4ea; border-radius:12px; overflow-y:auto; box-shadow:0 10px 30px rgba(20,25,40,.14); display:none; max-height:360px; }
  .suggest.show { display:block; }
  .suggest .item { padding:12px 16px; cursor:pointer; display:flex; justify-content:space-between; align-items:center; gap:12px; }
  .suggest .item:hover, .suggest .item.active { background:#f2f6ff; }
  .suggest .item .nm { font-size:15px; } .suggest .item .nm b { color:#2563eb; font-weight:700; }
  .suggest .item .right { display:flex; align-items:center; gap:8px; white-space:nowrap; }
  .suggest .item .file { font-size:11px; color:#12864a; background:#e7f7ee; padding:2px 7px; border-radius:6px; }
  .suggest .item .sn { font-size:12px; color:#98a0ad; }
  .suggest .empty { padding:14px 16px; color:#98a0ad; font-size:14px; }
  .hint { max-width:640px; margin:8px auto 0; padding:0 18px; font-size:12px; color:#9aa1ad; }
  .stage { display:flex; flex-direction:column; align-items:center; gap:16px; padding:22px 12px 60px; }
  .page { width:297mm; height:210mm; position:relative; background:#fff; transform-origin: top center; box-shadow:0 6px 24px rgba(0,0,0,.15); overflow:hidden; -webkit-print-color-adjust:exact; print-color-adjust:exact; }

      if(!r.ok||!j.connected) throw new Error(j.error||('HTTP '+r.status));
      illustNames=new Set((j.names||[]).map(norm)); setBadge('badge2','badge2Text','on','일러스트DB 연동됨 ('+(j.count||0)+'개)'); renderSuggest();
    }catch(e){ setBadge('badge2','badge2Text','off','일러스트DB 연동 안 됨'); }
  }
  function search(term){ const t=norm(term); return t?PRODUCTS.filter(p=>norm(p.name).includes(t)):[]; }
  function highlight(name,term){ const t=term.trim(); if(!t)return name; const i=name.toLowerCase().indexOf(t.toLowerCase()); return i<0?name:name.slice(0,i)+'<b>'+name.slice(i,i+t.length)+'</b>'+name.slice(i+t.length); }
  function hasFile(name){ return illustNames.has(norm(name)); }
  function renderSuggest(){
    current=search(q.value); activeIdx=-1;
    if(!q.value.trim()){ suggest.classList.remove('show'); return; }
    suggest.innerHTML=current.length ? current.slice(0,50).map((p,i)=>{ const f=hasFile(p.name)?'<span class="file">파일 있음</span>':''; return `<div class="item" data-i="${i}"><span class="nm">${highlight(p.name,q.value)}</span><span class="right">${f}<span class="sn">${p.style_no||''}</span></span></div>`; }).join('') : '<div class="empty">일치하는 제품이 없어요</div>';
    suggest.classList.add('show');
    suggest.querySelectorAll('.item').forEach(el=> el.onclick=()=>choose(current[+el.dataset.i]));
  }
  function choose(p){ if(!p)return; fields.name.value=p.name; fields.style.value=p.style_no||''; fields.gong.value=p.factory||''; fields.nayum.value=p.factory||''; q.value=p.name; suggest.classList.remove('show'); loadGraphics(p.name); }
  function clearGraphics(){ document.getElementById('g100').innerHTML=''; document.getElementById('g115').innerHTML=''; document.querySelectorAll('.page.extra').forEach(el=>el.remove()); initTemplate(); }
  function loadImg(url){ return new Promise((res,rej)=>{ const im=new Image(); im.crossOrigin='anonymous'; im.onload=()=>res(im); im.onerror=()=>rej(new Error('이미지 로드 실패')); im.src=url; }); }
  async function loadAndTrim(proxiedUrl){
    const img=await loadImg(proxiedUrl);
    const W=img.naturalWidth, H=img.naturalHeight;
    const c=document.createElement('canvas'); c.width=W; c.height=H;
    const ctx=c.getContext('2d'); ctx.drawImage(img,0,0);
    let data; try{ data=ctx.getImageData(0,0,W,H).data; } catch(e){ return { src:img.src, w:W, h:H, trimmed:false }; }
    let minX=W,minY=H,maxX=-1,maxY=-1, hasAlpha=false;
    for(let i=3;i<data.length;i+=4){ if(data[i]<250){ hasAlpha=true; break; } }
    if(hasAlpha){ for(let y=0;y<H;y++) for(let x=0;x<W;x++){ if(data[(y*W+x)*4+3]>16){ if(x<minX)minX=x; if(x>maxX)maxX=x; if(y<minY)minY=y; if(y>maxY)maxY=y; } } }
    else { for(let y=0;y<H;y++) for(let x=0;x<W;x++){ const i=(y*W+x)*4; if(!(data[i]>245&&data[i+1]>245&&data[i+2]>245)){ if(x<minX)minX=x; if(x>maxX)maxX=x; if(y<minY)minY=y; if(y>maxY)maxY=y; } } }
    if(maxX<minX||maxY<minY) return { src:img.src, w:W, h:H, trimmed:false };
    const bw=maxX-minX+1, bh=maxY-minY+1;
    const c2=document.createElement('canvas'); c2.width=bw; c2.height=bh; c2.getContext('2d').drawImage(c, minX,minY,bw,bh, 0,0,bw,bh);
    return { src:c2.toDataURL('image/png'), w:bw, h:bh, trimmed:true };
  }
  function placeGraphic(slotId, src, wmm, hmm, cx, top){
    const slot=document.getElementById(slotId); slot.style.left=(cx-wmm/2)+'mm'; slot.style.top=top+'mm'; slot.innerHTML='';
    const el=document.createElement('img'); el.src=src; el.style.width=wmm+'mm'; el.style.height=hmm+'mm'; slot.appendChild(el);
  }
  function addGraphicPage(pct, src, wmm, hmm){
    // 안전장치: A4보다 크면 조용히 맞춤(알림 없음). 보통은 작동 안 함.
    if(wmm>PAGE_W || hmm>PAGE_H){ const k=Math.min(PAGE_W/wmm, PAGE_H/hmm); wmm*=k; hmm*=k; }
    const left=(PAGE_W-wmm)/2, top=(PAGE_H-hmm)/2;
    const page=document.createElement('div'); page.className='page extra';
    page.innerHTML=`<div class="gpage-label">${labelHTML(pct)}</div><div class="gpage-img" style="left:${left}mm;top:${top}mm"><img src="${src}" style="width:${wmm}mm;height:${hmm}mm"></div>`;
    stage.appendChild(page); fit();
  }
  async function loadGraphics(name){
    clearGraphics();
    if(!hasFile(name)){ gstatus.textContent='일러스트 파일 없음'; return; }
    gstatus.textContent='일러스트 불러오는 중…';
    try{
      const r=await fetch('/api/illust?name='+encodeURIComponent(name)); const j=await r.json();
      const imgs=(j.images||[]); if(!imgs.length){ gstatus.textContent='일러스트 파일 없음'; return; }
      const t=await loadAndTrim('/api/image?url='+encodeURIComponent(imgs[0].url));
      const w100=pxToMm(t.w), h100=pxToMm(t.h), w115=w100*1.15, h115=h100*1.15;
      const fits = w100<=G_MAXW && h100<=G_MAXH && w115<=G_MAXW && h115<=G_MAXH;
      if(fits){ setNote(NOTE_FIT); showPage1Labels(true); placeGraphic('g100',t.src,w100,h100,G_CX_L,G_TOP); placeGraphic('g115',t.src,w115,h115,G_CX_R,G_TOP); }
      else { setNote(NOTE_CENTER); showPage1Labels(false); addGraphicPage(100,t.src,w100,h100); addGraphicPage(115,t.src,w115,h115); }
      gstatus.textContent=`그래픽 ${w100.toFixed(0)}×${h100.toFixed(0)}mm · ${fits?'한 장':'3장'}`;
    }catch(e){ gstatus.textContent='일러스트 로드 실패: '+(e.message||e); }
  }
  q.addEventListener('input', renderSuggest); q.addEventListener('focus', renderSuggest);
  q.addEventListener('keydown', e=>{ const items=suggest.querySelectorAll('.item');
    if(e.key==='ArrowDown'){ e.preventDefault(); activeIdx=Math.min(activeIdx+1,items.length-1); }
    else if(e.key==='ArrowUp'){ e.preventDefault(); activeIdx=Math.max(activeIdx-1,0); }
    else if(e.key==='Enter'){ if(activeIdx>=0&&current[activeIdx]) choose(current[activeIdx]); else if(current.length===1) choose(current[0]); return; }
    else return; items.forEach((el,i)=> el.classList.toggle('active', i===activeIdx));
  });
  goBtn.onclick=()=>{ if(current.length) choose(current[0]); };
  document.addEventListener('click', e=>{ if(!e.target.closest('.search-wrap')) suggest.classList.remove('show'); });
  document.getElementById('print').onclick=()=>window.print();
  document.getElementById('clear').onclick=()=>{ Object.values(fields).forEach(i=>i.value=''); document.querySelector('#f_etc input').value=''; q.value=''; suggest.classList.remove('show'); clearGraphics(); gstatus.textContent=''; };
  function fit(){ const mmToPx=96/25.4, sheetW=PAGE_W*mmToPx; const scale=Math.min(window.innerWidth-30, sheetW)/sheetW;
    document.querySelectorAll('.page').forEach(p=>{ p.style.transform='scale('+scale+')'; p.style.marginBottom=(PAGE_H*mmToPx*scale - PAGE_H*mmToPx + 16)+'px'; }); }
  window.addEventListener('resize', fit);
  initTemplate(); fit(); loadProducts(); loadIllustNames();
</script>
</body>
